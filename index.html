<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoVista - Explore Countries</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="navbar">

        <div class="navbar-content">
            <div class="logo">🌏 GeoVista</div>
            
            <div class="search-container">
                <input type="text" id="searchInput" placeholder="Search countries by name...">
                <button id="searchButton">Search</button>
            </div>

            <div class="filters">
                <select id="regionFilter">
                    <option value="">Region</option>
                    <option value="Africa">Africa</option>
                    <option value="Americas">Americas</option>
                    <option value="Asia">Asia</option>
                    <option value="Europe">Europe</option>
                    <option value="Oceania">Oceania</option>
                </select>


                <select id="sortBy" aria-label="Sort countries">
                    <option value="">Sort</option>
                    <option value="name">A–Z</option>
                    <option value="population">Population(High → Low)</option>
                </select>

                <button id="resetBtn" class="reset-btn">Reset</button>
            </div>

        </div>

    </header>

    <div class="container">
        <div class="countries-container"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
